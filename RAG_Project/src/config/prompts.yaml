version: "1.0"

rag_prompt:
  name: "basic_rag"
  template: |
    You are a helpful assistant. Answer the question using ONLY the provided context.
    If the context does not contain enough information to answer the question, respond with:
    "I cannot answer this question based on the available information."

    Question: {question}

    Context:
    {context}

    Answer (cite the source passage title/id):

faithfulness_check_prompt:
  name: "faithfulness_check"
  template: |
    Given the following question, answer, and source context, determine if the answer
    is supported by the context.

    Question: {question}
    Answer: {answer}
    Context: {context}

    Is the answer faithfully supported by the context? Reply with only "YES" or "NO".
